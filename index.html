<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LootMusic</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #ffffff; color: #1a1a1a; font-family: 'Segoe UI', sans-serif; min-height: 100vh; transition: background 0.4s, color 0.4s; }
body.dark { background: #0d0d0d; color: #e0e0e0; }
.app { text-align: center; padding: 15px; max-width: 450px; width: 100%; min-height: 100vh; margin: 0 auto; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; padding-top: 8px; }
.logo { font-size: 24px; font-weight: 900; letter-spacing: 2px; color: #4a90d9; }
body.dark .logo { color: #2ecc71; }
.theme-btn { background: #f0f4f8; border: 2px solid #4a90d9; color: #1a1a1a; font-size: 20px; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
body.dark .theme-btn { background: #1a1a1a; border-color: #2ecc71; color: #e0e0e0; }
.tabs { display: flex; gap: 4px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; }
.tab { background: #e8ecf1; border: none; padding: 8px 12px; border-radius: 20px; cursor: pointer; font-weight: 600; font-size: 12px; color: #1a1a1a; }
body.dark .tab { background: #1e1e1e; color: #ccc; }
.tab.active { background: #4a90d9; color: #fff; }
body.dark .tab.active { background: #2ecc71; color: #000; }
.card { background: #f0f4f8; border: 3px solid #888; border-radius: 20px; padding: 20px; margin-bottom: 10px; min-height: 140px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
body.dark .card { background: #1a1a1a; }
.card.rare { border-color: #4a90d9; box-shadow: 0 0 15px rgba(74,144,217,0.3); }
.card.epic { border-color: #9b59b6; box-shadow: 0 0 20px rgba(155,89,182,0.4); }
.card.legendary { border-color: #f1c40f; box-shadow: 0 0 25px rgba(241,196,15,0.5); }
.card-icon { font-size: 45px; margin-bottom: 8px; }
.card-title { font-size: 17px; font-weight: 700; }
.card-artist { font-size: 13px; opacity: 0.7; margin-bottom: 4px; }
.card-id { font-size: 9px; opacity: 0.4; font-family: monospace; }
.rarity-badge { display: inline-block; padding: 3px 12px; border-radius: 15px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
.rarity-common { background: #888; color: #fff; }
.rarity-rare { background: #4a90d9; color: #fff; }
.rarity-epic { background: #9b59b6; color: #fff; }
.rarity-legendary { background: #f1c40f; color: #000; }
.btn { background: #4a90d9; color: #fff; border: none; padding: 10px 20px; font-size: 14px; font-weight: 700; border-radius: 25px; cursor: pointer; width: 100%; margin-bottom: 5px; }
body.dark .btn { background: #1a3d2c; color: #ccffcc; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-small { font-size: 11px; padding: 6px 14px; width: auto; }
.timer { font-size: 12px; opacity: 0.7; margin-bottom: 10px; }
.rarity-dropdown { position: relative; display: inline-block; margin-top: 6px; }
.rarity-dropdown-btn { background: #888; color: #fff; border: none; padding: 6px 14px; border-radius: 15px; font-size: 11px; font-weight: 700; cursor: pointer; }
.rarity-dropdown-menu { display: none; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); background: #fff; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 10; min-width: 140px; }
body.dark .rarity-dropdown-menu { background: #2a2a2a; }
.rarity-dropdown-menu.show { display: block; }
.rarity-option { padding: 8px 14px; cursor: pointer; font-size: 12px; font-weight: 600; display: flex; justify-content: space-between; }
.rarity-option.common { color: #888; } .rarity-option.rare { color: #4a90d9; } .rarity-option.epic { color: #9b59b6; } .rarity-option.legendary { color: #f1c40f; }
.points { font-size: 11px; font-weight: 700; color: #f1c40f; margin-bottom: 4px; }
.collection-item { background: #f0f4f8; border-radius: 12px; padding: 10px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; text-align: left; }
body.dark .collection-item { background: #1a1a1a; }
.collection-icon { font-size: 30px; }
.collection-info { flex: 1; }
.collection-title { font-weight: 700; font-size: 14px; }
.collection-artist { font-size: 12px; opacity: 0.6; }
.collection-date { font-size: 10px; opacity: 0.4; }
.collection-id { font-size: 8px; opacity: 0.3; font-family: monospace; }
.copy-btn { background: none; border: none; cursor: pointer; font-size: 10px; opacity: 0.5; }
.chat-box { background: #f0f4f8; border-radius: 15px; padding: 10px; height: 250px; overflow-y: auto; text-align: left; margin-bottom: 8px; font-size: 13px; }
body.dark .chat-box { background: #1a1a1a; }
.chat-msg { padding: 4px 8px; margin-bottom: 3px; border-radius: 8px; background: #e0e4e8; }
body.dark .chat-msg { background: #2a2a2a; }
.chat-msg .nick { font-weight: 700; color: #4a90d9; font-size: 11px; }
body.dark .chat-msg .nick { color: #2ecc71; }
.chat-msg .time { font-size: 9px; opacity: 0.5; }
.chat-input-row { display: flex; gap: 6px; }
.chat-input-row input { flex: 1; padding: 8px 14px; border-radius: 20px; border: 2px solid #4a90d9; font-size: 13px; outline: none; }
body.dark .chat-input-row input { background: #2a2a2a; border-color: #2ecc71; color: #fff; }
.trade-section { background: #f0f4f8; border-radius: 15px; padding: 12px; margin-bottom: 10px; text-align: left; font-size: 13px; }
body.dark .trade-section { background: #1a1a1a; }
.trade-section h3 { font-size: 15px; margin-bottom: 8px; }
.trade-section input { width: 100%; padding: 8px 12px; border-radius: 15px; border: 2px solid #4a90d9; font-size: 12px; margin-bottom: 6px; outline: none; }
body.dark .trade-section input { background: #2a2a2a; border-color: #2ecc71; color: #fff; }
.trade-card { background: #e0e4e8; border-radius: 10px; padding: 8px 12px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
body.dark .trade-card { background: #2a2a2a; }
.trade-card .status { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 10px; }
.status-pending { background: #f1c40f; color: #000; }
.status-accepted { background: #2ecc71; color: #fff; }
.status-rejected { background: #e74c3c; color: #fff; }
.modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 100; }
.modal-box { background: #fff; border-radius: 20px; padding: 25px; text-align: center; max-width: 320px; width: 90%; }
body.dark .modal-box { background: #1e1e1e; }
.modal-box input { width: 100%; padding: 10px 15px; border-radius: 25px; border: 2px solid #4a90d9; font-size: 14px; margin: 8px 0; outline: none; text-align: center; }
body.dark .modal-box input { background: #2a2a2a; border-color: #2ecc71; color: #fff; }
.modal-link { color: #4a90d9; cursor: pointer; font-size: 13px; text-decoration: underline; }
.empty { opacity: 0.5; padding: 30px; }
audio { width: 100%; margin-top: 8px; border-radius: 8px; height: 35px; }
.error-msg { color: #e74c3c; font-size: 12px; display: none; }
.suggestions { background: #fff; border-radius: 10px; max-height: 120px; overflow-y: auto; position: absolute; width: 90%; z-index: 5; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
body.dark .suggestions { background: #2a2a2a; }
.suggest-item { padding: 8px 12px; cursor: pointer; font-size: 12px; border-bottom: 1px solid #eee; text-align: left; }
body.dark .suggest-item { border-color: #444; }
.suggest-item:hover { background: #f0f0f0; }
body.dark .suggest-item:hover { background: #3a3a3a; }
</style>
</head>
<body id="body">
<div class="app">
  <div class="header">
    <div class="logo">LOOTMUSIC</div>
    <button class="theme-btn" onclick="toggleTheme()">🌙</button>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('crate')">🎁 Кейс</button>
    <button class="tab" onclick="switchTab('collection')">📦 Коллекция</button>
    <button class="tab" onclick="switchTab('trade')">🔄 Обмен</button>
    <button class="tab" onclick="switchTab('chat')">💬 Чат</button>
    <button class="tab" onclick="switchTab('profile')">👤</button>
  </div>

  <div id="tab-crate">
    <div class="card" id="card"><div class="card-icon">🎁</div><div class="card-title">??? ????</div><div class="card-artist">Unknown</div><span class="rarity-badge rarity-common">???</span></div>
    <button class="btn" id="openBtn" onclick="openCrate()">🔓 Открыть кейс</button>
    <div class="timer" id="timer"></div>
    <div id="raritySelector" style="display:none;">
      <div class="points" id="pointsDisplay">⭐ 0</div>
      <div class="rarity-dropdown">
        <button class="rarity-dropdown-btn" id="dropdownBtn" onclick="toggleDropdown()">Редкость ▾</button>
        <div class="rarity-dropdown-menu" id="dropdownMenu">
          <div class="rarity-option common" onclick="setRarity('common',0)">Common (0⭐)</div>
          <div class="rarity-option rare" onclick="setRarity('rare',1)">Rare (1⭐)</div>
          <div class="rarity-option epic" onclick="setRarity('epic',3)">Epic (3⭐)</div>
          <div class="rarity-option legendary" onclick="setRarity('legendary',5)">Legendary (5⭐)</div>
        </div>
      </div>
    </div>
    <div id="player"></div>
  </div>

  <div id="tab-collection" style="display:none;"><div id="collectionList"><div class="empty">Пусто</div></div></div>

  <div id="tab-trade" style="display:none;">
    <div class="trade-section">
      <h3>🎁 Подарить трек</h3>
      <input type="text" id="giftTrackInput" placeholder="Название или ID трека..." oninput="searchMyTracks('giftTrackInput','giftSuggest')">
      <div class="suggestions" id="giftSuggest" style="display:none;"></div>
      <input type="text" id="giftPlayerInput" placeholder="Никнейм игрока..." oninput="searchPlayers('giftPlayerInput','giftPlayerSuggest')">
      <div class="suggestions" id="giftPlayerSuggest" style="display:none;"></div>
      <button class="btn btn-small" onclick="sendGift()">🎁 Отправить</button>
    </div>
    <div class="trade-section">
      <h3>🔄 Предложить обмен</h3>
      <input type="text" id="myTrackInput" placeholder="Мой трек (название/ID)..." oninput="searchMyTracks('myTrackInput','myTrackSuggest')">
      <div class="suggestions" id="myTrackSuggest" style="display:none;"></div>
      <input type="text" id="theirTrackInput" placeholder="Трек игрока (название/ID)..." oninput="searchTheirTracks('theirTrackInput','theirTrackSuggest')">
      <div class="suggestions" id="theirTrackSuggest" style="display:none;"></div>
      <input type="text" id="tradePlayerInput" placeholder="Никнейм игрока..." oninput="searchPlayers('tradePlayerInput','tradePlayerSuggest')">
      <div class="suggestions" id="tradePlayerSuggest" style="display:none;"></div>
      <button class="btn btn-small" onclick="sendTrade()">🔄 Предложить</button>
    </div>
    <div id="activeTrades"><div class="empty">Нет активных обменов</div></div>
  </div>

  <div id="tab-chat" style="display:none;">
    <div class="chat-box" id="chatBox"></div>
    <div class="chat-input-row">
      <input type="text" id="chatInput" placeholder="Сообщение..." onkeydown="if(event.key==='Enter')sendChat()">
      <button class="btn btn-small" onclick="sendChat()">→</button>
    </div>
  </div>

  <div id="tab-profile" style="display:none;">
    <div class="card">
      <div class="card-icon">👤</div><div class="card-title" id="profileName">-</div>
      <div class="card-artist" id="profileCount">0 треков</div>
      <div class="points" id="profilePoints">⭐ 0</div>
    </div>
    <button class="btn" onclick="logout()">🚪 Выйти</button>
  </div>
</div>

<div id="loginModal" class="modal">
  <div class="modal-box" id="loginBox">
    <h2>🎵 Вход</h2>
    <input type="text" id="loginNick" placeholder="Никнейм" maxlength="20">
    <input type="password" id="loginPass" placeholder="Пароль" maxlength="30">
    <div class="error-msg" id="loginError">Неверно</div>
    <button class="btn" onclick="login()">Войти</button>
    <span class="modal-link" onclick="showRegister()">Создать аккаунт</span>
  </div>
  <div class="modal-box" id="registerBox" style="display:none;">
    <h2>🎵 Регистрация</h2>
    <input type="text" id="regNick" placeholder="Никнейм" maxlength="20">
    <input type="password" id="regPass" placeholder="Пароль" maxlength="30">
    <input type="password" id="regPass2" placeholder="Повтори пароль" maxlength="30">
    <div class="error-msg" id="regError"></div>
    <button class="btn" onclick="register()">Создать</button>
    <span class="modal-link" onclick="showLogin()">Уже есть аккаунт</span>
  </div>
</div>

<script>
// Firebase Init
const firebaseConfig = {
  apiKey: "AIzaSyAoAsjA5FHfQ7WglssP9_c6MV6mi_CL0Sw",
  authDomain: "lootmusic-e6049.firebaseapp.com",
  projectId: "lootmusic-e6049",
  storageBucket: "lootmusic-e6049.firebasestorage.app",
  messagingSenderId: "459404858144",
  appId: "1:459404858144:web:d6977fa33535a7cb467d45",
  databaseURL: "https://lootmusic-e6049-default-rtdb.europe-west1.firebasedatabase.app/"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const rtdb = firebase.database();

const tracks = [
  { id:1, title:"Аппетит", artist:"Дайте танк (!)", icon:"🍽️", audio:"https://ru-d3.drivemusic.me/dl/yX8JSuNNpn_vvB3eP0PwNg/1783219830/download_music/2024/07/dajjte-tank-appetit.mp3" },
  { id:2, title:"Братик, выдыхай", artist:"Антон Небо", icon:"🌬️", audio:"https://ru-d3.drivemusic.me/dl/eQKgtyNjGVUB1kijrwMiMA/1783219954/download_music/2026/01/anton-nebo-bratik-vydykhajj.mp3" },
  { id:3, title:"Играю в роблокс", artist:"Черный Джек", icon:"🎮", audio:"https://ru-d2.drivemusic.me/dl/im9EndZ8xjE5zmO4KLG6Hw/1783219983/download_music/2026/01/chernyjj-dzhek-igraju-v-robloks.mp3" },
  { id:4, title:"Она похоронена здесь", artist:"Щенки", icon:"🪦", audio:"https://ru-d2.drivemusic.me/dl/4UQO0aBj_svn2jwjhwhuXA/1783220126/download_music/2024/11/shhenki-ona-pokhoronena-zdes.mp3" },
  { id:5, title:"Нихуя", artist:"Щенки", icon:"💥", audio:"https://ru-d1.drivemusic.me/dl/Iki0ZEgO79Aexb6UhlbvxA/1783220160/download_music/2026/01/shhenki-nikhuja.mp3" }
];

let user = null, isDark = false, usersDB = {}, currentTrack = null;

function loadUsersDB() { const raw = localStorage.getItem('lootmusic_users'); if (raw) usersDB = JSON.parse(raw); }
function saveUsersDB() { localStorage.setItem('lootmusic_users', JSON.stringify(usersDB)); }
function saveUser() { if (user && usersDB[user.nick]) { usersDB[user.nick].data = user; saveUsersDB(); } }
function loadUser() { const nick = localStorage.getItem('lootmusic_active'); if (nick && usersDB[nick]) user = usersDB[nick].data; }
function generateUID(nick) { return nick + '-' + Date.now() + '-' + Math.random().toString(36).substring(2, 8); }

function toggleTheme() {
  isDark = !isDark;
  document.getElementById('body').classList.toggle('dark', isDark);
  document.querySelector('.theme-btn').textContent = isDark ? '☀️' : '🌙';
  localStorage.setItem('lootmusic_theme', isDark ? 'dark' : 'light');
}

function showRegister() { document.getElementById('loginBox').style.display='none'; document.getElementById('registerBox').style.display='block'; }
function showLogin() { document.getElementById('registerBox').style.display='none'; document.getElementById('loginBox').style.display='block'; }

function register() {
  const nick = document.getElementById('regNick').value.trim();
  const pass = document.getElementById('regPass').value;
  const pass2 = document.getElementById('regPass2').value;
  const err = document.getElementById('regError');
  if (!nick || !pass) { err.textContent='Заполни'; err.style.display='block'; return; }
  if (pass !== pass2) { err.textContent='Пароли не совпадают'; err.style.display='block'; return; }
  if (usersDB[nick]) { err.textContent='Занят'; err.style.display='block'; return; }
  usersDB[nick] = { pass, data: { nick, collection: [], lastOpen: null, points: 2 } };
  saveUsersDB(); user = usersDB[nick].data;
  localStorage.setItem('lootmusic_active', nick);
  document.getElementById('loginModal').style.display='none';
  switchTab('crate');
}

function login() {
  const nick = document.getElementById('loginNick').value.trim();
  const pass = document.getElementById('loginPass').value;
  if (!usersDB[nick] || usersDB[nick].pass !== pass) { document.getElementById('loginError').style.display='block'; return; }
  user = usersDB[nick].data; localStorage.setItem('lootmusic_active', nick);
  document.getElementById('loginModal').style.display='none';
  switchTab('crate');
}

function logout() {
  if (confirm('Выйти?')) {
    localStorage.removeItem('lootmusic_active'); user = null;
    document.getElementById('loginModal').style.display='flex'; showLogin();
    switchTab('crate');
    document.getElementById('card').innerHTML = '<div class="card-icon">🎁</div><div class="card-title">??? ????</div><div class="card-artist">Unknown</div><span class="rarity-badge rarity-common">???</span>';
    document.getElementById('raritySelector').style.display='none'; currentTrack = null;
  }
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => { if (t.textContent.includes(tab==='crate'?'Кейс':tab==='collection'?'Коллекция':tab==='trade'?'Обмен':tab==='chat'?'Чат':'👤')) t.classList.add('active'); });
  ['crate','collection','trade','chat','profile'].forEach(t => document.getElementById('tab-'+t).style.display = t===tab?'block':'none');
  if (tab==='collection') renderCollection();
  if (tab==='profile') { document.getElementById('profileName').textContent=user?.nick||'-'; document.getElementById('profileCount').textContent=(user?.collection?.length||0)+' треков'; document.getElementById('profilePoints').textContent='⭐ '+(user?.points||0); }
  if (tab==='trade') loadActiveTrades();
  updateTimer();
}

function toggleDropdown() { if (currentTrack && !currentTrack.rarityLocked) document.getElementById('dropdownMenu').classList.toggle('show'); }

function openCrate() {
  if (!user) return alert('Войди!');
  if (!canOpen()) return;
  document.getElementById('openBtn').disabled = true;
  document.getElementById('raritySelector').style.display='none';
  setTimeout(() => {
    currentTrack = {...tracks[Math.floor(Math.random()*tracks.length)]};
    currentTrack.uid = generateUID(user.nick);
    currentTrack.rarity='common'; currentTrack.obtainedAt=new Date().toISOString(); currentTrack.rarityLocked=false;
    user.lastOpen=new Date().toISOString(); user.points=(user.points||0)+1;
    user.collection.push(currentTrack); saveUser();
    updateCard(currentTrack);
    document.getElementById('raritySelector').style.display='block';
    document.getElementById('pointsDisplay').textContent='⭐ '+user.points;
    document.getElementById('player').innerHTML = '<audio controls autoplay><source src="'+currentTrack.audio+'" type="audio/mpeg"></audio>';
    updateTimer();
  },800);
}

function setRarity(rarity,cost) {
  if (!currentTrack||currentTrack.rarityLocked) return;
  if (user.points < cost) return alert('Мало очков!');
  user.points-=cost; currentTrack.rarity=rarity; currentTrack.rarityLocked=true;
  const idx = user.collection.findIndex(t=>t.uid===currentTrack.uid);
  if (idx>=0) user.collection[idx]=currentTrack;
  saveUser(); updateCard(currentTrack);
  document.getElementById('raritySelector').style.display='none';
  document.getElementById('dropdownMenu').classList.remove('show');
}

function searchMyTracks(inputId, suggestId) {
  const val = document.getElementById(inputId).value.toLowerCase();
  const s = document.getElementById(suggestId);
  if (!val) { s.style.display='none'; return; }
  const matches = (user?.collection||[]).filter(t => t.title.toLowerCase().includes(val) || t.uid.toLowerCase().includes(val) || t.artist.toLowerCase().includes(val));
  if (!matches.length) { s.style.display='none'; return; }
  s.innerHTML = matches.map(t => '<div class="suggest-item" onclick="selectTrack(\''+inputId+'\',\''+suggestId+'\',\''+t.uid+'\')">'+t.icon+' '+t.title+' - '+t.artist+' <span style=opacity:0.5>'+t.rarity+'</span></div>').join('');
  s.style.display='block';
}

function searchPlayers(inputId, suggestId) {
  const val = document.getElementById(inputId).value.toLowerCase();
  const s = document.getElementById(suggestId);
  if (!val) { s.style.display='none'; return; }
  const matches = Object.keys(usersDB).filter(n => n.toLowerCase().includes(val) && n !== user?.nick);
  if (!matches.length) { s.style.display='none'; return; }
  s.innerHTML = matches.map(n => '<div class="suggest-item" onclick="selectPlayer(\''+inputId+'\',\''+suggestId+'\',\''+n+'\')">👤 '+n+'</div>').join('');
  s.style.display='block';
}

function selectTrack(inputId, suggestId, uid) { document.getElementById(inputId).value = uid; document.getElementById(suggestId).style.display = 'none'; }
function selectPlayer(inputId, suggestId, nick) { document.getElementById(inputId).value = nick; document.getElementById(suggestId).style.display = 'none'; }

async function sendGift() {
  const trackUid = document.getElementById('giftTrackInput').value.trim();
  const targetNick = document.getElementById('giftPlayerInput').value.trim();
  if (!trackUid || !targetNick) return alert('Заполни поля');
  const track = user.collection.find(t => t.uid === trackUid);
  if (!track) return alert('Трек не найден');
  if (!usersDB[targetNick]) return alert('Игрок не найден');
  try {
    await db.collection('gifts').add({ from: user.nick, to: targetNick, track, timestamp: Date.now(), status: 'pending' });
    alert('Подарок отправлен!');
  } catch(e) { alert('Ошибка: '+e.message); }
}

async function sendTrade() {
  const myUid = document.getElementById('myTrackInput').value.trim();
  const theirUid = document.getElementById('theirTrackInput').value.trim();
  const targetNick = document.getElementById('tradePlayerInput').value.trim();
  if (!myUid || !theirUid || !targetNick) return alert('Заполни все поля');
  const myTrack = user.collection.find(t => t.uid === myUid);
  if (!myTrack) return alert('Твой трек не найден');
  if (!usersDB[targetNick]) return alert('Игрок не найден');
  try {
    await db.collection('trades').add({ from: user.nick, to: targetNick, fromTrack: myTrack, toTrackUid: theirUid, status: 'pending', timestamp: Date.now() });
    alert('Обмен предложен!');
    loadActiveTrades();
  } catch(e) { alert('Ошибка: '+e.message); }
}

async function acceptTrade(tradeId) {
  try { await db.collection('trades').doc(tradeId).update({ status: 'accepted' }); loadActiveTrades(); } catch(e) {}
}
async function rejectTrade(tradeId) {
  try { await db.collection('trades').doc(tradeId).update({ status: 'rejected' }); loadActiveTrades(); } catch(e) {}
}

function sendChat() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg || !user) return;
  rtdb.ref('chat').push({ nick: user.nick, text: msg, time: firebase.database.ServerValue.TIMESTAMP });
  input.value = '';
}

function copyID(uid) { navigator.clipboard.writeText(uid).then(()=>alert('Скопировано!')); }

function canOpen() { if (!user) return false; if (!user.lastOpen) return true; return (Date.now()-new Date(user.lastOpen).getTime()) >= 2*60*60*1000; }
function timeUntil() {
  if (!user?.lastOpen) return 'Можно открыть!';
  const diff = 2*60*60*1000 - (Date.now()-new Date(user.lastOpen).getTime());
  if (diff<=0) return 'Можно открыть!';
  return 'Через: '+Math.floor(diff/3600000)+'ч '+Math.floor((diff%3600000)/60000)+'м';
}

function updateTimer() {
  const btn = document.getElementById('openBtn');
  document.getElementById('timer').textContent = user ? timeUntil() : '';
  if (user) { btn.disabled = !canOpen(); btn.textContent = canOpen()?'🔓 Открыть кейс':'⏳ Жди'; }
  else btn.disabled = true;
}

function updateCard(t) {
  const card = document.getElementById('card'); card.className='card';
  if (t.rarity!=='common') card.classList.add(t.rarity);
  card.innerHTML = '<div class="card-icon">'+t.icon+'</div><div class="card-title">'+t.title+'</div><div class="card-artist">'+t.artist+'</div><span class="rarity-badge rarity-'+t.rarity+'">'+t.rarity+'</span><div class="card-id">'+t.uid+'</div>';
}

function renderCollection() {
  const list = document.getElementById('collectionList');
  if (!user?.collection?.length) { list.innerHTML='<div class="empty">Пусто</div>'; return; }
  list.innerHTML = [...user.collection].reverse().map(t => {
    const d = new Date(t.obtainedAt).toLocaleDateString('ru-RU');
    return '<div class="collection-item"><div class="collection-icon">'+t.icon+'</div><div class="collection-info"><div class="collection-title">'+t.title+'</div><div class="collection-artist">'+t.artist+'</div><div class="collection-date">'+d+'</div><div class="collection-id">'+t.uid+' <button class="copy-btn" onclick="copyID(\''+t.uid+'\')">📋</button></div></div><span class="rarity-badge rarity-'+t.rarity+'">'+t.rarity+'</span></div>';
  }).join('');
}

async function loadActiveTrades() {
  const container = document.getElementById('activeTrades');
  container.innerHTML = '<div class="empty">Загрузка...</div>';
  try {
    const s1 = await db.collection('trades').where('from','==',user.nick).get();
    const s2 = await db.collection('trades').where('to','==',user.nick).get();
    let html = '';
    s1.forEach(d => { const t = d.data(); html += tradeCard(d.id, t, 'Исходящий'); });
    s2.forEach(d => { const t = d.data(); html += tradeCard(d.id, t, 'Входящий'); });
    container.innerHTML = html || '<div class="empty">Нет активных обменов</div>';
  } catch(e) { container.innerHTML = '<div class="empty">Ошибка</div>'; }
}

function tradeCard(id, t, dir) {
  return '<div class="trade-card"><div>'+dir+': '+t.fromTrack.title+' ↔ '+t.toTrackUid+'<br><small>с '+ (dir==='Входящий'?t.from:t.to) +'</small></div><div><span class="status status-'+t.status+'">'+t.status+'</span>'+(t.status==='pending'&&dir==='Входящий'?' <button class="btn btn-small" onclick="acceptTrade(\''+id+'\')">✅</button> <button class="btn btn-small" onclick="rejectTrade(\''+id+'\')">❌</button>':'')+'</div></div>';
}

// Chat listener
rtdb.ref('chat').on('child_added', (snap) => {
  const msg = snap.val();
  const box = document.getElementById('chatBox');
  const time = msg.time ? new Date(msg.time).toLocaleTimeString().slice(0,5) : '';
  box.innerHTML += '<div class="chat-msg"><span class="nick">'+msg.nick+'</span> <span class="time">'+time+'</span><br>'+msg.text+'</div>';
  box.scrollTop = box.scrollHeight;
});

document.addEventListener('click', function(e) {
  if (!e.target.closest('.rarity-dropdown')) document.getElementById('dropdownMenu').classList.remove('show');
  if (!e.target.closest('#giftTrackInput') && !e.target.closest('#giftSuggest')) document.getElementById('giftSuggest').style.display='none';
  if (!e.target.closest('#giftPlayerInput') && !e.target.closest('#giftPlayerSuggest')) document.getElementById('giftPlayerSuggest').style.display='none';
  if (!e.target.closest('#myTrackInput') && !e.target.closest('#myTrackSuggest')) document.getElementById('myTrackSuggest').style.display='none';
  if (!e.target.closest('#tradePlayerInput') && !e.target.closest('#tradePlayerSuggest')) document.getElementById('tradePlayerSuggest').style.display='none';
});

// Init
loadUsersDB(); loadUser();
if (localStorage.getItem('lootmusic_theme')==='dark') { isDark=true; document.getElementById('body').classList.add('dark'); document.querySelector('.theme-btn').textContent='☀️'; }
if (!user) { document.getElementById('loginModal').style.display='flex'; document.getElementById('openBtn').disabled=true; }
else { document.getElementById('loginModal').style.display='none'; }
switchTab('crate');
setInterval(updateTimer, 1000);
</script>
</body>
</html>
