<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LootMusic</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff;color:#1a1a1a;font-family:'Segoe UI',sans-serif;min-height:100vh;transition:background .3s,color .3s}
body.dark{background:#0d0d0d;color:#e0e0e0}
.app{text-align:center;padding:12px;max-width:450px;width:100%;min-height:100vh;margin:0 auto}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding-top:8px}
.header-left{display:flex;align-items:center;gap:6px}
.online-badge{font-size:10px;background:#2ecc71;color:#000;padding:2px 6px;border-radius:10px;font-weight:700}
.logo{font-size:20px;font-weight:900;color:#4a90d9}
body.dark .logo{color:#2ecc71}
.theme-btn{background:#f0f4f8;border:2px solid #4a90d9;color:#1a1a1a;font-size:18px;width:36px;height:36px;border-radius:50%;cursor:pointer}
body.dark .theme-btn{background:#1a1a1a;border-color:#2ecc71;color:#e0e0e0}
.tabs{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap;justify-content:center}
.tab{background:#e8ecf1;border:none;padding:7px 10px;border-radius:18px;cursor:pointer;font-weight:600;font-size:11px;color:#1a1a1a}
body.dark .tab{background:#1e1e1e;color:#ccc}
.tab.active{background:#4a90d9;color:#fff}
body.dark .tab.active{background:#2ecc71;color:#000}
.card{background:#f0f4f8;border:3px solid #888;border-radius:18px;padding:20px;margin-bottom:10px;min-height:130px;display:flex;flex-direction:column;justify-content:center;align-items:center}
body.dark .card{background:#1a1a1a}
.card-icon{font-size:40px;margin-bottom:6px}
.card-title{font-size:16px;font-weight:700}
.card-artist{font-size:12px;opacity:.7;margin-bottom:4px}
.rating{font-size:14px;color:#f1c40f;margin-top:4px}
.rating-stars{display:flex;gap:4px;justify-content:center;margin-top:6px}
.star{cursor:pointer;font-size:22px;transition:.2s;color:#ccc}
.star.active{color:#f1c40f}
.btn{background:#4a90d9;color:#fff;border:none;padding:10px 20px;font-size:14px;font-weight:700;border-radius:25px;cursor:pointer;width:100%;margin-bottom:5px}
body.dark .btn{background:#1a3d2c;color:#ccffcc}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-small{font-size:11px;padding:6px 14px;width:auto}
.play-btn{background:#4a90d9;color:#fff;border:none;border-radius:50%;cursor:pointer;font-size:14px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
body.dark .play-btn{background:#2ecc71;color:#000}
.timer{font-size:11px;opacity:.7;margin-bottom:8px}
.reg-date{font-size:11px;opacity:.6;margin-top:4px}
.user-id{font-size:11px;opacity:.8;font-family:monospace;margin-top:4px;background:#e8ecf1;padding:3px 8px;border-radius:10px;display:inline-block}
body.dark .user-id{background:#2a2a2a}
.copy-btn{background:none;border:none;cursor:pointer;font-size:12px;opacity:.6;padding:0 4px}
.copy-btn:hover{opacity:1}
.collection-item{background:#f0f4f8;border-radius:12px;padding:10px;margin-bottom:6px;display:flex;align-items:center;gap:8px;text-align:left}
body.dark .collection-item{background:#1a1a1a}
.collection-icon{font-size:26px}
.collection-info{flex:1}
.collection-title{font-weight:700;font-size:13px}
.collection-artist{font-size:11px;opacity:.6}
.collection-date{font-size:9px;opacity:.4}
.chat-box{background:#f0f4f8;border-radius:15px;padding:10px;height:280px;overflow-y:auto;text-align:left;margin-bottom:8px;font-size:12px}
body.dark .chat-box{background:#1a1a1a}
.chat-msg{padding:5px 8px;margin-bottom:3px;border-radius:8px;background:#e0e4e8}
body.dark .chat-msg{background:#2a2a2a}
.chat-msg .nick{font-weight:700;color:#4a90d9;cursor:pointer;font-size:11px}
body.dark .chat-msg .nick{color:#2ecc71}
.chat-msg .time{font-size:8px;opacity:.5}
.chat-input-row{display:flex;gap:6px}
.chat-input-row input{flex:1;padding:8px 12px;border-radius:20px;border:2px solid #4a90d9;font-size:12px;outline:none}
body.dark .chat-input-row input{background:#2a2a2a;border-color:#2ecc71;color:#fff}
.trade-section{background:#f0f4f8;border-radius:15px;padding:10px;margin-bottom:8px;text-align:left;font-size:12px}
body.dark .trade-section{background:#1a1a1a}
.trade-section h3{font-size:14px;margin-bottom:6px}
.trade-section input{width:100%;padding:7px 10px;border-radius:15px;border:2px solid #4a90d9;font-size:11px;margin-bottom:5px;outline:none}
body.dark .trade-section input{background:#2a2a2a;border-color:#2ecc71;color:#fff}
.trade-card{background:#e0e4e8;border-radius:10px;padding:8px 10px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center;font-size:11px}
body.dark .trade-card{background:#2a2a2a}
.status{font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px}
.status-pending{background:#f1c40f;color:#000}
.status-accepted{background:#2ecc71;color:#fff}
.status-rejected{background:#e74c3c;color:#fff}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);display:flex;justify-content:center;align-items:center;z-index:100}
.modal-box{background:#fff;border-radius:20px;padding:20px;text-align:center;max-width:360px;width:95%;max-height:80vh;overflow-y:auto}
body.dark .modal-box{background:#1e1e1e}
.modal-box input{width:100%;padding:10px 14px;border-radius:20px;border:2px solid #4a90d9;font-size:13px;margin:6px 0;outline:none;text-align:center}
body.dark .modal-box input{background:#2a2a2a;border-color:#2ecc71;color:#fff}
.modal-link{color:#4a90d9;cursor:pointer;font-size:12px;text-decoration:underline}
.empty{opacity:.5;padding:25px;font-size:13px}
.global-player{position:fixed;bottom:0;left:0;width:100%;background:#f0f4f8;padding:6px;z-index:50;display:none;border-top:2px solid #4a90d9}
body.dark .global-player{background:#1a1a1a;border-color:#2ecc71}
.global-player audio{width:100%;height:30px}
.player-close{position:absolute;right:8px;top:2px;background:none;border:none;font-size:16px;cursor:pointer}
.back-btn{background:none;border:none;font-size:16px;cursor:pointer;padding:2px 6px}
.error-msg{color:#e74c3c;font-size:12px;display:none}
</style>
</head>
<body id="body">
<div class="app">
<div class="header"><div class="header-left"><span class="online-badge" id="onlineCount">🟢 0</span><div class="logo">LOOTMUSIC</div></div><button class="theme-btn" id="themeBtn">🌙</button></div>
<div class="tabs">
<button class="tab active" data-tab="crate">🎁</button><button class="tab" data-tab="collection">📦</button><button class="tab" data-tab="trade">🔄</button><button class="tab" data-tab="chat">💬</button><button class="tab" data-tab="profile">👤</button>
</div>

<div id="tab-crate"><div class="card" id="card"><div class="card-icon">🎁</div><div class="card-title">???</div><div class="card-artist">Unknown</div></div><button class="btn" id="openBtn">🔓 Открыть</button><div class="timer" id="timer"></div><div id="ratingBox" style="display:none"><div class="rating-stars" id="ratingStars"></div></div></div>
<div id="tab-collection" style="display:none"><div id="collectionList"><div class="empty">Пусто</div></div></div>
<div id="tab-trade" style="display:none">
<div class="trade-section"><h3>🎁 Подарить</h3><input id="giftTrack" placeholder="Название трека"><input id="giftPlayer" placeholder="Никнейм или ID"><button class="btn btn-small" id="giftBtn">Отправить</button></div>
<div class="trade-section"><h3>🔄 Обмен</h3><input id="myTrack" placeholder="Мой трек"><input id="theirTrack" placeholder="Трек игрока"><input id="tradePlayer" placeholder="Никнейм или ID"><button class="btn btn-small" id="tradeBtn">Предложить</button></div>
<div id="activeTrades"><div class="empty">Нет обменов</div></div>
</div>
<div id="tab-chat" style="display:none">
<div id="chatMain"><div class="chat-box" id="globalChatBox"></div><div class="chat-input-row"><input id="globalChatInput" placeholder="Общий чат..."><button class="btn btn-small" id="globalChatSend">→</button></div></div>
<div id="chatDM" style="display:none"><div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><button class="back-btn" id="dmBack">←</button><span id="dmTitle" style="font-weight:700;cursor:pointer;font-size:13px"></span></div><div class="chat-box" id="dmChatBox"></div><div class="chat-input-row"><input id="dmChatInput" placeholder="ЛС..."><button class="btn btn-small" id="dmChatSend">→</button></div></div>
</div>
<div id="tab-profile" style="display:none"><div class="card"><div class="card-icon">👤</div><div class="card-title" id="profileName">-</div><div class="user-id" id="profileId"></div><div class="card-artist" id="profileCount">0 треков</div><div class="reg-date" id="profileRegDate"></div></div><button class="btn" id="logoutBtn">🚪 Выйти</button></div>
</div>
<div id="globalPlayer" class="global-player"><button class="player-close" id="playerClose">✕</button><audio id="globalAudio" controls></audio></div>
<div id="loginModal" class="modal">
<div class="modal-box" id="loginBox"><h2>🎵 Вход</h2><input id="loginNick" placeholder="Никнейм" maxlength="20"><input type="password" id="loginPass" placeholder="Пароль"><div class="error-msg" id="loginError">Неверно</div><button class="btn" id="loginBtn">Войти</button><span class="modal-link" id="toRegister">Создать аккаунт</span></div>
<div class="modal-box" id="registerBox" style="display:none"><h2>🎵 Регистрация</h2><input id="regNick" placeholder="Никнейм" maxlength="20"><input type="password" id="regPass" placeholder="Пароль"><input type="password" id="regPass2" placeholder="Повтори пароль"><div class="error-msg" id="regError"></div><button class="btn" id="registerBtn">Создать</button><span class="modal-link" id="toLogin">Уже есть аккаунт</span></div>
</div>
<div id="profileModal" class="modal" style="display:none"><div class="modal-box" id="profileContent"></div></div>

<script>
window.onload=function(){

firebase.initializeApp({apiKey:"AIzaSyAoAsjA5FHfQ7WglssP9_c6MV6mi_CL0Sw",authDomain:"lootmusic-e6049.firebaseapp.com",projectId:"lootmusic-e6049",storageBucket:"lootmusic-e6049.firebasestorage.app",messagingSenderId:"459404858144",appId:"1:459404858144:web:d6977fa33535a7cb467d45",databaseURL:"https://lootmusic-e6049-default-rtdb.europe-west1.firebasedatabase.app"});
const db=firebase.firestore(),rtdb=firebase.database(),DAY=86400000;
const tracks=[{id:1,title:"Аппетит",artist:"Дайте танк (!)",icon:"🍽️",audio:"https://ru-d3.drivemusic.me/dl/yX8JSuNNpn_vvB3eP0PwNg/1783219830/download_music/2024/07/dajjte-tank-appetit.mp3"},{id:2,title:"Братик, выдыхай",artist:"Антон Небо",icon:"🌬️",audio:"https://ru-d3.drivemusic.me/dl/eQKgtyNjGVUB1kijrwMiMA/1783219954/download_music/2026/01/anton-nebo-bratik-vydykhajj.mp3"},{id:3,title:"Играю в роблокс",artist:"Черный Джек",icon:"🎮",audio:"https://ru-d2.drivemusic.me/dl/im9EndZ8xjE5zmO4KLG6Hw/1783219983/download_music/2026/01/chernyjj-dzhek-igraju-v-robloks.mp3"},{id:4,title:"Она похоронена здесь",artist:"Щенки",icon:"🪦",audio:"https://ru-d2.drivemusic.me/dl/4UQO0aBj_svn2jwjhwhuXA/1783220126/download_music/2024/11/shhenki-ona-pokhoronena-zdes.mp3"},{id:5,title:"Нихуя",artist:"Щенки",icon:"💥",audio:"https://ru-d1.drivemusic.me/dl/Iki0ZEgO79Aexb6UhlbvxA/1783220160/download_music/2026/01/shhenki-nikhuja.mp3"}];
let user=null,isDark=false,currentTrack=null,dmPartner=null;

function genID(){let id='';for(let i=0;i<6;i++)id+=Math.floor(Math.random()*10);return id}
function DK(a,b){return[a,b].sort().join('_')}

const onlineRef=rtdb.ref('online');

async function saveUserToDB(u){try{await db.collection('users').doc(u.uid).set(u)}catch(e){console.error('Save error:',e)}}
async function loadUserFromDB(id,cb){try{let d=await db.collection('users').doc(id).get();if(d.exists)return cb(d.data());const s=await db.collection('users').where('nick','==',id).get();cb(s.empty?null:s.docs[0].data())}catch(e){console.error('Load error:',e);cb(null)}}

document.getElementById('themeBtn').onclick=function(){isDark=!isDark;document.getElementById('body').classList.toggle('dark',isDark);this.textContent=isDark?'☀️':'🌙';localStorage.setItem('lootmusic_theme',isDark?'dark':'light')};
document.getElementById('toRegister').onclick=function(){document.getElementById('loginBox').style.display='none';document.getElementById('registerBox').style.display='block'};
document.getElementById('toLogin').onclick=function(){document.getElementById('registerBox').style.display='none';document.getElementById('loginBox').style.display='block'};

document.getElementById('registerBtn').onclick=async function(){
  const n=document.getElementById('regNick').value.trim(),p=document.getElementById('regPass').value,p2=document.getElementById('regPass2').value,er=document.getElementById('regError');
  er.style.display='none';if(!n||!p){er.textContent='Заполни';er.style.display='block';return}
  if(p!==p2){er.textContent='Пароли не совпадают';er.style.display='block';return}
  const snap=await db.collection('users').where('nick','==',n).get();
  if(!snap.empty){er.textContent='Никнейм занят';er.style.display='block';return}
  const uid=genID();user={uid,nick:n,pass:p,collection:[],lastOpen:null,createdAt:new Date().toISOString()};
  await saveUserToDB(user);localStorage.setItem('lootmusic_uid',uid);
  onlineRef.child(uid).set(true);onlineRef.child(uid).onDisconnect().remove();
  document.getElementById('loginModal').style.display='none';switchTab('crate');
};

document.getElementById('loginBtn').onclick=async function(){
  const n=document.getElementById('loginNick').value.trim(),p=document.getElementById('loginPass').value,er=document.getElementById('loginError');
  er.style.display='none';
  const snap=await db.collection('users').where('nick','==',n).get();
  if(snap.empty){er.style.display='block';return}
  const data=snap.docs[0].data();
  if(data.pass!==p){er.style.display='block';return}
  if(!data.uid){data.uid=genID();await saveUserToDB(data)}
  user=data;localStorage.setItem('lootmusic_uid',user.uid);
  onlineRef.child(user.uid).set(true);onlineRef.child(user.uid).onDisconnect().remove();
  document.getElementById('loginModal').style.display='none';switchTab('crate');
};

document.getElementById('logoutBtn').onclick=function(){if(confirm('Выйти?')){onlineRef.child(user.uid).remove();localStorage.removeItem('lootmusic_uid');user=null;document.getElementById('loginModal').style.display='flex';switchTab('crate');document.getElementById('card').innerHTML='<div class="card-icon">🎁</div><div class="card-title">???</div><div class="card-artist">Unknown</div>';document.getElementById('ratingBox').style.display='none';currentTrack=null}};

document.getElementById('openBtn').onclick=function(){if(!user)return alert('Войди!');if(!canOpen())return;this.disabled=true;document.getElementById('ratingBox').style.display='none';setTimeout(()=>{currentTrack={...tracks[Math.floor(Math.random()*tracks.length)]};currentTrack.obtainedAt=new Date().toISOString();currentTrack.rated=false;user.lastOpen=new Date().toISOString();user.collection.push(currentTrack);saveUserToDB(user);updateCard(currentTrack);document.getElementById('ratingBox').style.display='block';showRatingStars();playTrack(currentTrack);updateTimer()},800)};

document.getElementById('giftBtn').onclick=async function(){const tu=document.getElementById('giftTrack').value.trim(),tp=document.getElementById('giftPlayer').value.trim();if(!tu||!tp)return alert('Заполни');const t=user.collection.find(x=>x.title.toLowerCase()===tu.toLowerCase());if(!t)return alert('Трек не найден');loadUserFromDB(tp,async function(target){if(!target)return alert('Игрок не найден');try{await db.collection('gifts').add({from:user.nick,fromId:user.uid,to:target.nick,toId:target.uid,track:t,timestamp:Date.now(),status:'pending'});alert('Подарок отправлен!')}catch(e){alert('Ошибка')}})};
document.getElementById('tradeBtn').onclick=async function(){const mu=document.getElementById('myTrack').value.trim(),tu=document.getElementById('theirTrack').value.trim(),tp=document.getElementById('tradePlayer').value.trim();if(!mu||!tu||!tp)return alert('Заполни');const mt=user.collection.find(x=>x.title.toLowerCase()===mu.toLowerCase());if(!mt)return alert('Трек не найден');loadUserFromDB(tp,async function(target){if(!target)return alert('Игрок не найден');try{await db.collection('trades').add({from:user.nick,fromId:user.uid,to:target.nick,toId:target.uid,fromTrack:mt,toTrackUid:tu,status:'pending',timestamp:Date.now()});alert('Обмен предложен!');loadActiveTrades()}catch(e){alert('Ошибка')}})};

document.getElementById('globalChatSend').onclick=function(){const m=document.getElementById('globalChatInput').value.trim();if(!m||!user)return;rtdb.ref('global').push().set({nick:user.nick,uid:user.uid,text:m,time:Date.now()});document.getElementById('globalChatInput').value=''};
document.getElementById('globalChatInput').onkeydown=function(e){if(e.key==='Enter')document.getElementById('globalChatSend').click()};
document.getElementById('dmBack').onclick=function(){dmPartner=null;document.getElementById('chatDM').style.display='none';document.getElementById('chatMain').style.display='block'};
document.getElementById('dmChatSend').onclick=function(){const m=document.getElementById('dmChatInput').value.trim();if(!m||!user||!dmPartner)return;rtdb.ref('dm').child(DK(user.uid,dmPartner)).push().set({from:user.nick,fromId:user.uid,toId:dmPartner,text:m,time:Date.now()});document.getElementById('dmChatInput').value=''};
document.getElementById('dmChatInput').onkeydown=function(e){if(e.key==='Enter')document.getElementById('dmChatSend').click()};
document.getElementById('playerClose').onclick=function(){document.getElementById('globalPlayer').style.display='none';document.getElementById('globalAudio').pause()};
document.querySelectorAll('.tab').forEach(tab=>{tab.onclick=function(){switchTab(this.dataset.tab)}});

function switchTab(t){document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelector('.tab[data-tab="'+t+'"]').classList.add('active');['crate','collection','trade','chat','profile'].forEach(x=>document.getElementById('tab-'+x).style.display=x===t?'block':'none');if(t==='collection')renderCollection();if(t==='profile'){document.getElementById('profileName').textContent=user?.nick||'-';document.getElementById('profileCount').textContent=(user?.collection?.length||0)+' треков';if(user?.createdAt)document.getElementById('profileRegDate').textContent='📅 '+new Date(user.createdAt).toLocaleDateString('ru-RU');if(user?.uid)document.getElementById('profileId').innerHTML='🆔 '+user.uid+' <button class="copy-btn" onclick="navigator.clipboard.writeText(\''+user.uid+'\')">📋</button>'}if(t==='trade')loadActiveTrades();updateTimer()}

function showRatingStars(){const box=document.getElementById('ratingStars');box.innerHTML='';for(let i=1;i<=5;i++){const star=document.createElement('span');star.className='star';star.textContent='★';star.onmouseenter=function(){for(let j=0;j<i;j++)box.children[j].classList.add('active')};star.onmouseleave=function(){for(let j=0;j<5;j++)box.children[j].classList.remove('active')};star.onclick=async function(){if(!currentTrack||currentTrack.rated)return;currentTrack.rated=true;currentTrack.myRating=i;const idx=user.collection.findIndex(t=>t.obtainedAt===currentTrack.obtainedAt&&t.title===currentTrack.title);if(idx>=0)user.collection[idx]=currentTrack;saveUserToDB(user);document.getElementById('ratingBox').style.display='none';updateCard(currentTrack);await db.collection('ratings').add({trackTitle:currentTrack.title,trackArtist:currentTrack.artist,rating:i,ratedBy:user.nick,timestamp:Date.now()});updateGlobalRating(currentTrack.title)};box.appendChild(star)}}

async function updateGlobalRating(title){const snap=await db.collection('ratings').where('trackTitle','==',title).get();if(snap.empty)return;let sum=0;snap.forEach(d=>sum+=d.data().rating);const avg=Math.round(sum/snap.size*10)/10;document.querySelectorAll('.global-rating-'+title.replace(/[^a-z0-9]/gi,'')).forEach(el=>el.textContent='⭐'+avg+' ('+snap.size+')')}

async function getGlobalRating(title,cb){try{const snap=await db.collection('ratings').where('trackTitle','==',title).get();if(snap.empty){cb(0,0);return}let sum=0;snap.forEach(d=>sum+=d.data().rating);cb(Math.round(sum/snap.size*10)/10,snap.size)}catch(e){cb(0,0)}}

function playTrack(t){document.getElementById('globalPlayer').style.display='block';document.getElementById('globalAudio').src=t.audio;document.getElementById('globalAudio').play()}

function viewProfile(id){loadUserFromDB(id,function(data){if(!data)return alert('Игрок не найден');const rd=data.createdAt?new Date(data.createdAt).toLocaleDateString('ru-RU'):'?';let h='<h3>👤 '+data.nick+'</h3><p>🆔 '+data.uid+'</p><p>📅 '+rd+'</p><p>🎵 '+(data.collection?.length||0)+' треков</p><hr>';if(data.collection?.length){h+='<div id="profileTracks"></div>'}else h+='<div class="empty">Пусто</div>';h+='<button class="btn btn-small" id="closeProfile">Закрыть</button>';document.getElementById('profileContent').innerHTML=h;document.getElementById('profileModal').style.display='flex';document.getElementById('closeProfile').onclick=function(){document.getElementById('profileModal').style.display='none'};if(data.collection?.length){const c=document.getElementById('profileTracks');[...data.collection].reverse().forEach(t=>{const div=document.createElement('div');div.className='collection-item';div.innerHTML='<div class="collection-icon">'+t.icon+'</div><div class="collection-info"><div class="collection-title">'+t.title+'</div><div class="collection-artist">'+t.artist+'</div></div><span class="rating global-rating-'+t.title.replace(/[^a-z0-9]/gi,'')+'">...</span>';c.appendChild(div);getGlobalRating(t.title,function(avg,cnt){const el=c.querySelector('.rating');if(el)el.textContent=avg>0?'⭐'+avg+' ('+cnt+')':'—'})})}})}

function openDM(id){loadUserFromDB(id,function(data){if(!data)return;if(data.uid===user.uid){viewProfile(data.uid);return}dmPartner=data.uid;document.getElementById('chatMain').style.display='none';document.getElementById('chatDM').style.display='block';document.getElementById('dmTitle').textContent='💬 '+data.nick;document.getElementById('dmTitle').onclick=function(){viewProfile(data.uid)};document.getElementById('dmChatBox').innerHTML='';listenDM()})}

function listenDM(){if(!dmPartner||!user)return;const key=DK(user.uid,dmPartner);rtdb.ref('dm').child(key).off();rtdb.ref('dm').child(key).on('child_added',snap=>{const m=snap.val();if(Date.now()-m.time>DAY){snap.ref.remove();return}const b=document.getElementById('dmChatBox'),t=new Date(m.time).toLocaleTimeString().slice(0,5);b.innerHTML+='<div class="chat-msg"><span class="nick">'+m.from+'</span> <span class="time">'+t+'</span><br>'+m.text+'</div>';b.scrollTop=b.scrollHeight})}

function canOpen(){if(!user)return false;if(!user.lastOpen)return true;return(Date.now()-new Date(user.lastOpen).getTime())>=7200000}
function timeUntil(){if(!user?.lastOpen)return'Можно!';const d=7200000-(Date.now()-new Date(user.lastOpen).getTime());if(d<=0)return'Можно!';return'Через: '+Math.floor(d/3600000)+'ч '+Math.floor((d%3600000)/60000)+'м'}
function updateTimer(){const b=document.getElementById('openBtn');document.getElementById('timer').textContent=user?timeUntil():'';if(user){b.disabled=!canOpen();b.textContent=canOpen()?'🔓 Открыть':'⏳ Жди'}else b.disabled=true}
function updateCard(t){document.getElementById('card').innerHTML='<div class="card-icon">'+t.icon+'</div><div class="card-title">'+t.title+'</div><div class="card-artist">'+t.artist+'</div><span class="rating global-rating-'+t.title.replace(/[^a-z0-9]/gi,'')+'">⭐'+(t.myRating||'?')+'</span>'}

function renderCollection(){const l=document.getElementById('collectionList');if(!user?.collection?.length){l.innerHTML='<div class="empty">Пусто</div>';return}l.innerHTML='';[...user.collection].reverse().forEach(t=>{const div=document.createElement('div');div.className='collection-item';div.innerHTML='<div class="collection-icon">'+t.icon+'</div><div class="collection-info"><div class="collection-title">'+t.title+'</div><div class="collection-artist">'+t.artist+'</div><div class="collection-date">'+new Date(t.obtainedAt).toLocaleDateString('ru-RU')+'</div></div><button class="play-btn">▶</button><span class="rating global-rating-'+t.title.replace(/[^a-z0-9]/gi,'')+'">⭐'+(t.myRating||'?')+'</span>';div.querySelector('.play-btn').onclick=function(){playTrack(t)};l.appendChild(div);getGlobalRating(t.title,function(avg,cnt){const el=div.querySelector('.rating');if(el)el.textContent='⭐'+avg+' ('+cnt+')'})})}

async function loadActiveTrades(){const c=document.getElementById('activeTrades');c.innerHTML='<div class="empty">Загрузка...</div>';try{const s1=await db.collection('trades').where('fromId','==',user.uid).get(),s2=await db.collection('trades').where('toId','==',user.uid).get();let h='';s1.forEach(d=>{const t=d.data();h+='<div class="trade-card"><div>📤 '+t.fromTrack.title+'<br><small>с '+t.to+'</small></div><div><span class="status status-'+t.status+'">'+t.status+'</span></div></div>'});s2.forEach(d=>{const t=d.data();h+='<div class="trade-card"><div>📥 '+t.fromTrack.title+'<br><small>от '+t.from+'</small></div><div><span class="status status-'+t.status+'">'+t.status+'</span>'+(t.status==='pending'?' <button class="btn btn-small accept-btn" data-id="'+d.id+'">✅</button> <button class="btn btn-small reject-btn" data-id="'+d.id+'">❌</button>':'')+'</div></div>'});c.innerHTML=h||'<div class="empty">Нет обменов</div>';c.querySelectorAll('.accept-btn').forEach(b=>b.onclick=async function(){await db.collection('trades').doc(this.dataset.id).update({status:'accepted'});loadActiveTrades()});c.querySelectorAll('.reject-btn').forEach(b=>b.onclick=async function(){await db.collection('trades').doc(this.dataset.id).update({status:'rejected'});loadActiveTrades()})}catch(e){c.innerHTML='<div class="empty">Ошибка</div>'}}

rtdb.ref('global').on('child_added',snap=>{const m=snap.val();if(Date.now()-m.time>DAY){snap.ref.remove();return}const b=document.getElementById('globalChatBox'),t=new Date(m.time).toLocaleTimeString().slice(0,5);const div=document.createElement('div');div.className='chat-msg';div.innerHTML='<span class="nick">'+m.nick+'</span> <span class="time">'+t+'</span><br>'+m.text;div.querySelector('.nick').onclick=function(){openDM(m.uid||m.nick)};b.appendChild(div);b.scrollTop=b.scrollHeight});

onlineRef.on('value',snap=>{document.getElementById('onlineCount').textContent='🟢 '+(snap.numChildren()||0)});

setInterval(()=>{const c=Date.now()-DAY;rtdb.ref('global').orderByChild('time').endAt(c).once('value',snap=>{snap.forEach(s=>s.ref.remove())});rtdb.ref('dm').once('value',snap=>{snap.forEach(chat=>{chat.forEach(msg=>{if(msg.val().time<c)msg.ref.remove()})})})},600000);

(async function init(){
if(localStorage.getItem('lootmusic_theme')==='dark'){isDark=true;document.getElementById('body').classList.add('dark');document.getElementById('themeBtn').textContent='☀️'}
const uid=localStorage.getItem('lootmusic_uid');
if(uid){loadUserFromDB(uid,async function(data){if(data){user=data;onlineRef.child(user.uid).set(true);onlineRef.child(user.uid).onDisconnect().remove();document.getElementById('loginModal').style.display='none'}else{localStorage.removeItem('lootmusic_uid');document.getElementById('loginModal').style.display='flex';document.getElementById('openBtn').disabled=true}switchTab('crate');setInterval(updateTimer,1000)})}else{document.getElementById('loginModal').style.display='flex';document.getElementById('openBtn').disabled=true;switchTab('crate');setInterval(updateTimer,1000)}
})();

};
</script>
</body>
</html>
