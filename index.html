<script>

async function saveUser(u){try{await db.collection('users').doc(u.uid).set(u)}catch(e){}}

async function getOnlineUsers(cb){onlineRef.once('value',snap=>{const uids=[];snap.forEach(s=>uids.push(s.key));const users=[];let done=0;if(!uids.length){cb([]);return}uids.forEach(uid=>{loadUser(uid,function(u){if(u)users.push(u);done++;if(done>=uids.length)cb(users)})})})}

function isMuted(u){if(!u?.mutedUntil)return false;if(Date.now()>u.mutedUntil){u.mutedUntil=null;saveUser(u);return false}return true}
function checkSpam(){const now=Date.now();messageTimestamps.push(now);messageTimestamps=messageTimestamps.filter(t=>now-t<SPAM_WINDOW);return messageTimestamps.length>SPAM_LIMIT}

function setupSuggestions(inputId,suggestId,sourceFn){
  const input=document.getElementById(inputId),suggest=document.getElementById(suggestId);
  input.oninput=function(){const v=this.value.toLowerCase();if(!v){suggest.style.display='none';return}sourceFn(v,function(items){if(!items.length){suggest.style.display='none';return}suggest.innerHTML=items.map(i=>'<div class="suggest-item" data-val="'+i.val+'">'+i.text+'</div>').join('');suggest.style.display='block';suggest.querySelectorAll('.suggest-item').forEach(el=>el.onclick=function(){input.value=this.dataset.val;suggest.style.display='none'})})};

}

document.getElementById('giftBtn').onclick=async function(){
  if(!canGift(user))return alert('Новичкам нельзя дарить треки 24 часа после регистрации!');
  const tt=document.getElementById('giftTrack').value.trim(),tp=document.getElementById('giftPlayer').value.trim();
  if(!tt||!tp)return alert('Заполни');const t=user.collection?.find(x=>x.title.toLowerCase()===tt.toLowerCase());
  if(!t)return alert('Трек не найден');
  loadUser(tp,async function(target){if(!target)return alert('Игрок не найден');
    user.collection=user.collection.filter(x=>x!==t);if(!target.collection)target.collection=[];target.collection.push(t);
    await saveUser(user);await saveUser(target);await db.collection('history').add({type:'gift',from:user.nick,fromId:user.uid,to:target.nick,toId:target.uid,track:t.title,timestamp:Date.now()});
    alert('Подарок отправлен!');switchTab('collection');
  });
};

// Trade
document.getElementById('tradeBtn').onclick=async function(){
  const mt=document.getElementById('myTrack').value.trim(),tt=document.getElementById('theirTrack').value.trim(),tp=document.getElementById('tradePlayer').value.trim();
  if(!mt||!tp)return alert('Заполни');const myTrack=user.collection?.find(x=>x.title.toLowerCase()===mt.toLowerCase());
  if(!myTrack)return alert('Трек не найден');
  loadUser(tp,async function(target){if(!target)return alert('Игрок не найден');
    const isOnline=(await onlineRef.child(target.uid).once('value')).exists();
    const timeout=isOnline?TRADE_TIMEOUT_ONLINE:TRADE_TIMEOUT_OFFLINE;
    const expiresAt=Date.now()+timeout;
    await db.collection('trades').add({from:user.nick,fromId:user.uid,to:target.nick,toId:target.uid,fromTrack:myTrack,toTrackWanted:tt,status:'pending',timestamp:Date.now(),expiresAt});
    alert('Обмен предложен! ('+(isOnline?'10 сек':'10 мин')+')');loadActiveTrades();updateNotifs();
  });
};

async function acceptTrade(id){const ref=db.collection('trades').doc(id);const t=(await ref.get()).data();if(!t||t.status!=='pending')return;loadUser(t.fromId,async function(from){loadUser(t.toId,async function(to){const fromTrack=from.collection?.find(x=>x.title===t.fromTrack.title);let toTrack=to.collection?.find(x=>x.title===t.toTrackWanted);if(!toTrack)toTrack=to.collection?.[0];if(!fromTrack||!toTrack)return alert('Трек не найден');from.collection=from.collection.filter(x=>x!==fromTrack);to.collection=to.collection.filter(x=>x!==toTrack);from.collection.push(toTrack);to.collection.push(fromTrack);await saveUser(from);await saveUser(to);await ref.update({status:'accepted'});await db.collection('history').add({type:'trade',from:t.from,to:t.to,fromTrack:t.fromTrack.title,toTrack:toTrack.title,timestamp:Date.now()});if(user.uid===from.uid)user=from;if(user.uid===to.uid)user=to;loadActiveTrades();updateNotifs()})})}
async function rejectTrade(id){await db.collection('trades').doc(id).update({status:'rejected'});loadActiveTrades();updateNotifs()}

async function loadActiveTrades(){
  const c=document.getElementById('activeTrades');if(!user){c.innerHTML='';return}
  const s1=await db.collection('trades').where('fromId','==',user.uid).where('status','==','pending').get();
  const s2=await db.collection('trades').where('toId','==',user.uid).where('status','==','pending').get();
  let h='';s1.forEach(d=>{const t=d.data();h+='<div class="trade-card"><div>📤 '+t.fromTrack.title+' ↔ '+(t.toTrackWanted||'?')+'<br><small>'+t.to+'</small></div><div><span class="status status-pending">ждём</span></div></div>'});
  s2.forEach(d=>{const t=d.data();h+='<div class="trade-card"><div>📥 '+t.fromTrack.title+' ↔ '+(t.toTrackWanted||'?')+'<br><small>от '+t.from+'</small></div><div><span class="status status-pending">'+formatTimeout(t.expiresAt)+'</span> <button class="btn btn-small" onclick="acceptTrade(\''+d.id+'\')">✅</button> <button class="btn btn-small" onclick="rejectTrade(\''+d.id+'\')">❌</button></div></div>'});
  c.innerHTML=h||'<div class="empty">Нет обменов</div>';
  const hs=await db.collection('history').where('fromId','==',user.uid).orderBy('timestamp','desc').limit(10).get();
  const hs2=await db.collection('history').where('toId','==',user.uid).orderBy('timestamp','desc').limit(10).get();
  let hist='';hs.forEach(d=>{const t=d.data();hist+='<div style="font-size:10px;padding:2px 0">'+t.type+' 📤 '+t.track+(t.toTrack?' ↔ '+t.toTrack:'')+' → '+t.to+'</div>'});
  hs2.forEach(d=>{const t=d.data();hist+='<div style="font-size:10px;padding:2px 0">'+t.type+' 📥 '+(t.toTrack||t.track)+' ← '+t.from+'</div>'});
  document.getElementById('historyList').innerHTML=hist||'<div class="empty">Пусто</div>';
}

function formatTimeout(exp){if(!exp)return'';const d=exp-Date.now();if(d<=0)return'истёк';const s=Math.floor(d/1000);return s>60?Math.floor(s/60)+'м':s+'с'}

async function updateNotifs(){
  if(!user)return;const s=await db.collection('trades').where('toId','==',user.uid).where('status','==','pending').get();
  const badge=document.getElementById('tradeBadge');
  if(s.size>0){badge.style.display='flex';badge.textContent=s.size}else{badge.style.display='none'}
}

// Chat
document.getElementById('globalChatSend').onclick=function(){const m=document.getElementById('globalChatInput').value.trim();if(!m||!user)return;if(isMuted(user))return alert('Вы в муте!');if(checkSpam()){user.mutedUntil=Date.now()+MUTE_DURATION;saveUser(user);alert('Мут 24ч за спам!');return}rtdb.ref('global').push().set({nick:user.nick,uid:user.uid,text:m,time:Date.now()});document.getElementById('globalChatInput').value=''};
document.getElementById('globalChatInput').onkeydown=function(e){if(e.key==='Enter')document.getElementById('globalChatSend').click()};
document.getElementById('dmBack').onclick=function(){dmPartner=null;document.getElementById('chatDM').style.display='none';document.getElementById('chatMain').style.display='block';if(user?.uid===ADMIN.uid)document.getElementById('chatAdmin').style.display='block'};
document.getElementById('dmDelete').onclick=function(){if(dmPartner){rtdb.ref('dm').child(DK(user.uid,dmPartner)).remove();closeDM()}};
document.getElementById('dmChatSend').onclick=function(){const m=document.getElementById('dmChatInput').value.trim();if(!m||!user||!dmPartner)return;if(isMuted(user))return alert('Мут!');rtdb.ref('dm').child(DK(user.uid,dmPartner)).push().set({from:user.nick,fromId:user.uid,toId:dmPartner,text:m,time:Date.now()});document.getElementById('dmChatInput').value=''};
document.getElementById('dmChatInput').onkeydown=function(e){if(e.key==='Enter')document.getElementById('dmChatSend').click()};
document.getElementById('playerClose').onclick=function(){document.getElementById('globalPlayer').style.display='none';document.getElementById('globalAudio').pause()};

// Admin
document.getElementById('adminBack').onclick=function(){document.getElementById('chatAdmin').style.display='none';document.getElementById('chatMain').style.display='block'};
document.getElementById('adminDMBack').onclick=function(){adminDMTarget=null;document.getElementById('adminDMChat').style.display='none';loadAdminChats()};
document.getElementById('adminMuteBtn').onclick=async function(){if(!adminDMTarget)return;loadUser(adminDMTarget,async function(t){if(!t)return;t.mutedUntil=Date.now()+MUTE_DURATION;await saveUser(t);alert(t.nick+' в муте 24ч')})};

function openDM(id){
  loadUser(id,function(data){if(!data)return;if(data.uid===user.uid)return;
    if(user.uid===ADMIN.uid){adminDMTarget=data.uid;document.getElementById('adminDMTitle').textContent='💬 '+data.nick;document.getElementById('adminDMChat').style.display='block';document.getElementById('adminDMChatBox').innerHTML='';listenAdminDM();return}
    dmPartner=data.uid;document.getElementById('chatMain').style.display='none';document.getElementById('chatDM').style.display='block';
    document.getElementById('dmTitle').textContent='💬 '+data.nick;document.getElementById('dmDelete').style.display='inline';document.getElementById('dmChatBox').innerHTML='';listenDM();
  });
}

function closeDM(){dmPartner=null;document.getElementById('chatDM').style.display='none';document.getElementById('chatMain').style.display='block';if(user?.uid===ADMIN.uid){document.getElementById('chatAdmin').style.display='block';loadAdminChats()}}

function listenDM(){if(!dmPartner||!user)return;const key=DK(user.uid,dmPartner);rtdb.ref('dm').child(key).off();rtdb.ref('dm').child(key).on('child_added',snap=>{const m=snap.val();const b=document.getElementById('dmChatBox'),t=new Date(m.time).toLocaleTimeString().slice(0,5);const div=document.createElement('div');div.className='chat-msg';div.innerHTML='<span class="nick">'+m.from+'</span> <span class="time">'+t+'</span><br>'+m.text;if(m.from===user.nick){const del=document.createElement('button');del.className='delete-msg';del.textContent='🗑';del.onclick=function(){snap.ref.remove();div.remove()};div.appendChild(del)}b.appendChild(div);b.scrollTop=b.scrollHeight})}

function listenAdminDM(){if(!adminDMTarget||!user)return;const key=DK(user.uid,adminDMTarget);rtdb.ref('dm').child(key).off();rtdb.ref('dm').child(key).on('child_added',snap=>{const m=snap.val();const b=document.getElementById('adminDMChatBox'),t=new Date(m.time).toLocaleTimeString().slice(0,5);const div=document.createElement('div');div.className='chat-msg';div.innerHTML='<span class="nick">'+m.from+'</span> <span class="time">'+t+'</span><br>'+m.text;const del=document.createElement('button');del.className='delete-msg';del.textContent='🗑';del.onclick=function(){snap.ref.remove();div.remove()};div.appendChild(del);b.appendChild(div);b.scrollTop=b.scrollHeight})}

async function loadAdminChats(){
  if(!user||user.uid!==ADMIN.uid)return;
  const list=document.getElementById('adminChatList');list.innerHTML='';
  const snap=await rtdb.ref('dm').once('value');const seen=new Set();
  snap.forEach(chat=>{chat.forEach(msg=>{const m=msg.val();if(m.fromId!==user.uid&&!seen.has(m.fromId)){seen.add(m.fromId);loadUser(m.fromId,function(u){if(!u)return;const div=document.createElement('div');div.className='admin-chat-item';div.innerHTML='<span>'+u.nick+'</span><span><button class="mute-btn" title="Мут">🔇</button> <button class="delete-chat" title="Удалить чат">🗑</button></span>';div.onclick=function(e){if(e.target.tagName==='BUTTON')return;openDM(u.uid)};div.querySelector('.mute-btn').onclick=function(e){e.stopPropagation();loadUser(u.uid,async function(t){t.mutedUntil=Date.now()+MUTE_DURATION;await saveUser(t);alert('Мут 24ч')})};div.querySelector('.delete-chat').onclick=function(e){e.stopPropagation();rtdb.ref('dm').child(DK(user.uid,u.uid)).remove();div.remove()};list.appendChild(div)})}})});if(!list.children.length)list.innerHTML='<div class="empty">Нет сообщений</div>';
}

rtdb.ref('global').on('child_added',snap=>{const m=snap.val();if(Date.now()-m.time>DAY){snap.ref.remove();return}const b=document.getElementById('globalChatBox'),t=new Date(m.time).toLocaleTimeString().slice(0,5);const div=document.createElement('div');div.className='chat-msg';div.innerHTML='<span class="nick">'+m.nick+'</span> <span class="time">'+t+'</span><br>'+m.text;div.querySelector('.nick').onclick=function(){openDM(m.uid||m.nick)};b.appendChild(div);b.scrollTop=b.scrollHeight});

onlineRef.on('value',snap=>{document.getElementById('onlineCount').textContent='🟢 '+(snap.numChildren()||0)});

setInterval(async()=>{const snap=await db.collection('trades').where('status','==','pending').get();snap.forEach(async d=>{const t=d.data();if(t.expiresAt&&Date.now()>t.expiresAt){await db.collection('trades').doc(d.id).update({status:'expired'})}})},5000);
setInterval(()=>{const c=Date.now()-DAY;rtdb.ref('global').orderByChild('time').endAt(c).once('value',snap=>{snap.forEach(s=>s.ref.remove())})},600000);

// Rating
function showRatingStars(){const box=document.getElementById('ratingStars');box.innerHTML='';for(let i=1;i<=5;i++){const star=document.createElement('span');star.className='star';star.textContent='★';star.onmouseenter=function(){for(let j=0;j<i;j++)box.children[j].classList.add('active')};star.onmouseleave=function(){for(let j=0;j<5;j++)box.children[j].classList.remove('active')};star.onclick=async function(){if(!currentTrack||currentTrack.rated)return;currentTrack.rated=true;currentTrack.myRating=i;const idx=user.collection.findIndex(t=>t.obtainedAt===currentTrack.obtainedAt&&t.title===currentTrack.title);if(idx>=0)user.collection[idx]=currentTrack;saveUser(user);document.getElementById('ratingBox').style.display='none';updateCard(currentTrack);await db.collection('ratings').add({trackTitle:currentTrack.title,rating:i,ratedBy:user.nick,timestamp:Date.now()});updateGlobalRating(currentTrack.title)};box.appendChild(star)}}

async function updateGlobalRating(title){const snap=await db.collection('ratings').where('trackTitle','==',title).get();if(snap.empty)return;let sum=0;snap.forEach(d=>sum+=d.data().rating);const avg=Math.round(sum/snap.size*10)/10;document.querySelectorAll('.gr-'+title.replace(/[^a-z]/gi,'')).forEach(el=>el.textContent='⭐'+avg+' ('+snap.size+')')}
async function getGlobalRating(title,cb){try{const snap=await db.collection('ratings').where('trackTitle','==',title).get();if(snap.empty){cb(0,0);return}let sum=0;snap.forEach(d=>sum+=d.data().rating);cb(Math.round(sum/snap.size*10)/10,snap.size)}catch(e){cb(0,0)}}

function playTrack(t){document.getElementById('globalPlayer').style.display='block';document.getElementById('globalAudio').src=t.audio;document.getElementById('globalAudio').play()}
function viewProfile(id){loadUser(id,function(data){if(!data)return;const rd=data.createdAt?new Date(data.createdAt).toLocaleDateString('ru-RU'):'?';let h='<h3>👤 '+data.nick+'</h3><p>🆔 '+data.uid+'</p><p>📅 '+rd+'</p><p>🎵 '+(data.collection?.length||0)+' треков</p><hr>';if(data.collection?.length){h+='<div id="profileTracks"></div>'}else h+='<div class="empty">Пусто</div>';h+='<button class="btn btn-small" onclick="document.getElementById(\'profileModal\').style.display=\'none\'">Закрыть</button>';document.getElementById('profileContent').innerHTML=h;document.getElementById('profileModal').style.display='flex';if(data.collection?.length){const c=document.getElementById('profileTracks');[...data.collection].reverse().forEach(t=>{const div=document.createElement('div');div.className='collection-item';div.innerHTML='<div class="collection-icon">'+t.icon+'</div><div class="collection-info"><div class="collection-title">'+t.title+'</div><div class="collection-artist">'+t.artist+'</div></div><span class="rating gr-'+t.title.replace(/[^a-z]/gi,'')+'">...</span>';c.appendChild(div);getGlobalRating(t.title,function(avg,cnt){const el=c.querySelector('.rating');if(el)el.textContent=avg>0?'⭐'+avg+' ('+cnt+')':'—'})})}})}

function canOpen(){if(!user)return false;if(!user.lastOpen)return true;return(Date.now()-new Date(user.lastOpen).getTime())>=7200000}
function timeUntil(){if(!user?.lastOpen)return'Можно!';const d=7200000-(Date.now()-new Date(user.lastOpen).getTime());if(d<=0)return'Можно!';return'Через: '+Math.floor(d/3600000)+'ч '+Math.floor((d%3600000)/60000)+'м'}
function updateTimer(){const b=document.getElementById('openBtn');document.getElementById('timer').textContent=user?timeUntil():'';if(user){b.disabled=!canOpen();b.textContent=canOpen()?'🔓 Открыть':'⏳ Жди'}else b.disabled=true}
function updateCard(t){document.getElementById('card').innerHTML='<div class="card-icon">'+t.icon+'</div><div class="card-title">'+t.title+'</div><div class="card-artist">'+t.artist+'</div><span class="rating gr-'+t.title.replace(/[^a-z]/gi,'')+'">⭐'+(t.myRating||'?')+'</span>'}

function renderCollection(){const l=document.getElementById('collectionList');if(!user?.collection?.length){l.innerHTML='<div class="empty">Пусто</div>';return}l.innerHTML='';[...user.collection].reverse().forEach(t=>{const div=document.createElement('div');div.className='collection-item';div.innerHTML='<div class="collection-icon">'+t.icon+'</div><div class="collection-info"><div class="collection-title">'+t.title+'</div><div class="collection-artist">'+t.artist+'</div><div class="collection-date">'+new Date(t.obtainedAt).toLocaleDateString('ru-RU')+'</div></div><button class="play-btn">▶</button><span class="rating gr-'+t.title.replace(/[^a-z]/gi,'')+'">⭐'+(t.myRating||'?')+'</span>';div.querySelector('.play-btn').onclick=function(){playTrack(t)};l.appendChild(div);getGlobalRating(t.title,function(avg,cnt){const el=div.querySelector('.rating');if(el)el.textContent='⭐'+avg+' ('+cnt+')'})})}

function switchTab(t){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelector('.tab[data-tab="'+t+'"]').classList.add('active');
  ['crate','collection','trade','chat','profile'].forEach(x=>document.getElementById('tab-'+x).style.display=x===t?'block':'none');
  if(t==='collection')renderCollection();
  if(t==='profile'){document.getElementById('profileName').textContent=user?.nick||'-';document.getElementById('profileCount').textContent=(user?.collection?.length||0)+' треков';if(user?.createdAt)document.getElementById('profileRegDate').textContent='📅 '+new Date(user.createdAt).toLocaleDateString('ru-RU');document.getElementById('profileId').innerHTML=user?.uid?'🆔 '+user.uid+' <button class="copy-btn" onclick="navigator.clipboard.writeText(\''+user.uid+'\')">📋</button>':''}
  if(t==='trade'){loadActiveTrades();updateNotifs()}
  if(t==='chat'){if(user?.uid===ADMIN.uid){document.getElementById('chatAdmin').style.display='block';loadAdminChats()}}
  updateTimer()
}

document.querySelectorAll('.tab').forEach(tab=>{tab.onclick=function(){switchTab(this.dataset.tab)}});

window.acceptTrade=acceptTrade;window.rejectTrade=rejectTrade;window.openDM=openDM;window.viewProfile=viewProfile;window.copyID=function(id){navigator.clipboard.writeText(id)};window.PT=playTrack;window.closePlayer=function(){document.getElementById('globalPlayer').style.display='none';document.getElementById('globalAudio').pause()};

(async function init(){
if(localStorage.getItem('lootmusic_theme')==='dark'){isDark=true;document.getElementById('body').classList.add('dark');document.getElementById('themeBtn').textContent='☀️'}
const uid=localStorage.getItem('lootmusic_uid');
if(uid){loadUser(uid,async function(data){if(data){user=data;onlineRef.child(user.uid).set(true);onlineRef.child(user.uid).onDisconnect().remove();document.getElementById('loginModal').style.display='none'}else{localStorage.removeItem('lootmusic_uid');document.getElementById('loginModal').style.display='flex'}switchTab('crate');setInterval(updateTimer,1000);setInterval(updateNotifs,5000)})}else{document.getElementById('loginModal').style.display='flex';switchTab('crate');setInterval(updateTimer,1000)}
})();

};
</script>
